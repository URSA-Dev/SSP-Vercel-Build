version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    container_name: ssp-db
    env_file: .env
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    ports:
      - '5432:5432'
    volumes:
      - ssp_pgdata:/var/lib/postgresql/data
    networks:
      - database
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}']
      interval: 5s
      timeout: 5s
      retries: 5
    deploy:
      resources:
        limits:
          cpus: '1.0'
          memory: 512M
        reservations:
          cpus: '0.25'
          memory: 128M

  redis:
    image: redis:7-alpine
    container_name: ssp-cache
    ports:
      - '6379:6379'
    volumes:
      - ssp_redis:/data
    networks:
      - backend
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 10s
      timeout: 5s
      retries: 5
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 256M
        reservations:
          cpus: '0.1'
          memory: 64M

  backend:
    build:
      context: ../backend
      dockerfile: Dockerfile
    container_name: ssp-api
    env_file: .env
    ports:
      - '3001:3001'
    environment:
      PORT: 3001
      NODE_ENV: ${NODE_ENV:-development}
      DB_HOST: postgres
      DB_PORT: 5432
      DB_NAME: ${POSTGRES_DB}
      DB_USER: ${POSTGRES_USER}
      DB_PASS: ${POSTGRES_PASSWORD}
      JWT_SECRET: ${JWT_SECRET}
      REDIS_URL: redis://redis:6379
      MONGO_URI: mongodb://${MONGO_USER}:${MONGO_PASSWORD}@mongodb:27017/ssp_documents?authSource=admin
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      mongodb:
        condition: service_healthy
    networks:
      - frontend
      - backend
      - database
    healthcheck:
      test: ['CMD', 'wget', '-qO-', 'http://localhost:3001/api/v1/health']
      interval: 15s
      timeout: 5s
      start_period: 20s
      retries: 3
    deploy:
      resources:
        limits:
          cpus: '1.0'
          memory: 512M
        reservations:
          cpus: '0.25'
          memory: 128M

  frontend:
    build:
      context: ../frontend
      dockerfile: Dockerfile
    container_name: ssp-ui
    ports:
      - '80:80'
    depends_on:
      backend:
        condition: service_healthy
    networks:
      - frontend
    healthcheck:
      test: ['CMD', 'wget', '-qO-', 'http://localhost:80/']
      interval: 15s
      timeout: 5s
      start_period: 10s
      retries: 3
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 128M
        reservations:
          cpus: '0.1'
          memory: 32M

  mongodb:
    image: mongo:7-jammy
    container_name: ssp-docstore
    env_file: .env
    environment:
      MONGO_INITDB_ROOT_USERNAME: ${MONGO_USER}
      MONGO_INITDB_ROOT_PASSWORD: ${MONGO_PASSWORD}
      MONGO_INITDB_DATABASE: ssp_documents
    ports:
      - '27017:27017'
    volumes:
      - ssp_mongodb:/data/db
      - ./mongo-init:/docker-entrypoint-initdb.d
    networks:
      - backend
      - database
    healthcheck:
      test: ['CMD', 'mongosh', '--eval', "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 5
    deploy:
      resources:
        limits:
          cpus: '1.0'
          memory: 1G
        reservations:
          cpus: '0.25'
          memory: 256M

  pgadmin:
    image: dpage/pgadmin4:latest
    container_name: ssp-pgadmin
    env_file: .env
    environment:
      PGADMIN_DEFAULT_EMAIL: ${PGADMIN_EMAIL}
      PGADMIN_DEFAULT_PASSWORD: ${PGADMIN_PASSWORD}
      PGADMIN_CONFIG_SERVER_MODE: 'True'
    ports:
      - '5050:80'
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - ssp_pgadmin:/var/lib/pgadmin
    networks:
      - database
    healthcheck:
      test: ['CMD', 'wget', '-qO-', 'http://localhost:80/misc/ping']
      interval: 30s
      timeout: 10s
      start_period: 30s
      retries: 3
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 256M
        reservations:
          cpus: '0.1'
          memory: 64M

volumes:
  ssp_pgdata:
  ssp_redis:
  ssp_mongodb:
  ssp_pgadmin:

networks:
  frontend:
    driver: bridge
    name: ssp-frontend
  backend:
    driver: bridge
    name: ssp-backend
    internal: true
  database:
    driver: bridge
    name: ssp-database
    internal: true
